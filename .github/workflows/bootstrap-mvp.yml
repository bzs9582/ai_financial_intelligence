name: Bootstrap MVP

on:
  workflow_dispatch:

concurrency:
  group: codex-bootstrap-mvp
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Codex bootstrap
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_API_KEY }}
          responses-api-endpoint: ${{ vars.CODEX_RESPONSES_API_ENDPOINT }}
          prompt-file: prompts/bootstrap.md
          output-file: .factory/last-bootstrap.txt
          sandbox: workspace-write
          codex-args: '["--full-auto", "-m", "gpt-5.4", "-c", "model_reasoning_effort=\"xhigh\"", "-c", "disable_response_storage=true", "-c", "model_context_window=100000"]'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Verify result
        run: python -m factory.cli verify
      - name: Create draft PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/bootstrap-mvp
          commit-message: "codex: bootstrap MVP"
          title: "codex: bootstrap MVP"
          body: |
            Automated bootstrap PR generated by the Codex MVP factory.
          draft: true
          delete-branch: true
