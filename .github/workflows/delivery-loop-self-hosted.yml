name: Delivery Loop (Self Hosted)

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

concurrency:
  group: codex-delivery-loop-self-hosted
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run local Codex delivery phase
        run: python -m factory.cli run-phase deliver --skip-verify
      - name: Verify changes
        id: verify
        continue-on-error: true
        run: |
          python -m factory.cli verify > .factory/verify.log 2>&1
          Get-Content .factory/verify.log
        shell: powershell
      - name: Run local Codex autofix
        if: steps.verify.outcome == 'failure'
        run: python -m factory.cli run-phase autofix --skip-verify
      - name: Verify after autofix
        run: python -m factory.cli verify
      - name: Create draft PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/delivery-loop
          commit-message: "codex: delivery loop"
          title: "codex: delivery loop"
          body: |
            Automated delivery PR generated by the self-hosted hourly Codex loop.
          draft: true
          delete-branch: true
