name: Delivery Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

concurrency:
  group: codex-delivery-loop
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Codex delivery phase
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_API_KEY }}
          responses-api-endpoint: ${{ vars.CODEX_RESPONSES_API_ENDPOINT }}
          prompt-file: prompts/deliver.md
          output-file: .factory/last-deliver.txt
          sandbox: workspace-write
          codex-args: '["--full-auto", "-m", "gpt-5.4", "-c", "model_reasoning_effort=\"xhigh\"", "-c", "disable_response_storage=true", "-c", "model_context_window=100000"]'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Verify changes
        id: verify
        continue-on-error: true
        run: |
          python -m factory.cli verify > .factory/verify.log 2>&1
          cat .factory/verify.log
      - name: Run Codex autofix
        if: steps.verify.outcome == 'failure'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.CODEX_API_KEY }}
          responses-api-endpoint: ${{ vars.CODEX_RESPONSES_API_ENDPOINT }}
          prompt-file: prompts/autofix.md
          output-file: .factory/last-autofix.txt
          sandbox: workspace-write
          codex-args: '["--full-auto", "-m", "gpt-5.4", "-c", "model_reasoning_effort=\"xhigh\"", "-c", "disable_response_storage=true", "-c", "model_context_window=100000"]'
      - name: Verify after autofix
        run: python -m factory.cli verify
      - name: Create draft PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/delivery-loop
          commit-message: "codex: delivery loop"
          title: "codex: delivery loop"
          body: |
            Automated delivery PR generated by the hourly Codex loop.
          draft: true
          delete-branch: true
